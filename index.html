<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>像素求生 Pixel Survivors - Roguelike</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
  <div id="game-container"></div>
  <div id="name-modal" class="modal hidden">
    <div class="modal-box">
      <h2>歡迎，冒險者</h2>
      <p>輸入名字與密碼，就能在任何電腦讀取你的存檔進度</p>
      <input id="name-input" maxlength="12" placeholder="輸入名字..." />
      <input id="password-input" type="password" maxlength="32" placeholder="輸入密碼..." />
      <p id="name-error" class="modal-error hidden"></p>
      <button id="name-confirm">確認</button>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
